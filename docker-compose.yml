services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: compresskaro-web:latest
    ports:
      # Host port overridable via PORT (see bin/dev free-port selection).
      - "${PORT:-4321}:4321"
    volumes:
      - .:/app
      # Named volume so pnpm's node_modules (populated at image build) isn't
      # shadowed by the source bind-mount above.
      - node_modules:/app/node_modules
      # pnpm drops its content store next to the project root; keep it in a
      # volume so it doesn't leak into the bind-mounted host repo as .pnpm-store.
      - pnpm_store:/app/.pnpm-store
    environment:
      # File-watching across the Colima VM mount needs polling for reliable HMR.
      - CHOKIDAR_USEPOLLING=true
    # package.json "dev" script must bind 0.0.0.0 (astro dev --host 0.0.0.0)
    # so the container port is reachable from the host.
    command: pnpm dev

volumes:
  node_modules:
  pnpm_store:
